<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1f3d" />
    <meta name="description" content="Banesco Bank - A full-featured banking experience" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Banesco Bank" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Google Fonts - Sora for banking elegance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>Banesco Bank</title>
    <style>
      /* Critical path CSS - prevents flash */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0a1628; color: #e8f0ff; font-family: 'Sora', system-ui, sans-serif; }
      #root { height: 100%; }
      #splash {
        position: fixed; inset: 0; background: #0a1628;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 20px; z-index: 9999; transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-logo { width: 80px; height: 80px; border-radius: 20px; 
        background: linear-gradient(135deg, #1d4ed8, #0891b2);
        display: flex; align-items: center; justify-content: center;
        font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -1px;
        box-shadow: 0 0 40px rgba(59,130,246,0.4); animation: splashPulse 1.5s ease-in-out infinite;
      }
      .splash-name { font-size: 24px; font-weight: 700; color: #e8f0ff; letter-spacing: 0.5px; }
      .splash-sub { font-size: 13px; color: #8899b5; }
      .splash-bar { width: 180px; height: 3px; background: #162032; border-radius: 99px; overflow: hidden; }
      .splash-fill { height: 100%; background: linear-gradient(90deg, #1d4ed8, #06b6d4);
        border-radius: 99px; animation: splashLoad 1.2s ease-in-out forwards; }
      @keyframes splashPulse { 0%,100%{box-shadow:0 0 40px rgba(59,130,246,0.4)} 50%{box-shadow:0 0 60px rgba(59,130,246,0.7)} }
      @keyframes splashLoad { from{width:0} to{width:100%} }
    </style>
  </head>
  <body>
    <!-- Splash screen shown before React loads -->
    <div id="splash">
      <div class="splash-logo">B</div>
      <div class="splash-name">Banesco Bank</div>
      <div class="splash-sub">Banking That Works For You</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash after React mounts
      window.__hideSplash = function() {
        const s = document.getElementById('splash');
        if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 400); }
      };
    </script>
  </body>
</html>
